# ══════════════════════════════════════════════════════════════════════════════
#  Velour — Apache VirtualHost for XAMPP
#
#  1. Copy this file content into:
#       C:\xampp\apache\conf\extra\httpd-vhosts.conf
#
#  2. Add to your hosts file (C:\Windows\System32\drivers\etc\hosts):
#       127.0.0.1    velour.local
#
#  3. Restart Apache in XAMPP Control Panel.
#
#  4. Open http://velour.local in your browser.
# ══════════════════════════════════════════════════════════════════════════════

<VirtualHost *:80>
    ServerName velour.local
    ServerAlias www.velour.local

    # Point DocumentRoot to the /public directory
    DocumentRoot "C:/xampp/htdocs/velour/public"

    <Directory "C:/xampp/htdocs/velour/public">
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Logging
    ErrorLog  "C:/xampp/apache/logs/velour-error.log"
    CustomLog "C:/xampp/apache/logs/velour-access.log" combined

    # PHP settings for this vhost
    <IfModule php_module>
        php_value upload_max_filesize 32M
        php_value post_max_size       32M
        php_value memory_limit        256M
        php_value max_execution_time  120
    </IfModule>
</VirtualHost>
